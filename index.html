<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT | Supreme Admin Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        
        :root { 
            --bhagwa: #ff9933; 
            --bhagwa-dark: #cc5500; 
            /* 🍎 Authentic Apple Light Theme Colors */
            --bg-apple-light: #f5f5f7; 
            --text-dark: #1d1d1f;
            --text-gray: #86868b;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-apple-light); 
            color: var(--text-dark); 
            margin: 0; 
            overflow-x: hidden; 
            overflow-y: auto; 
        }
        
        /* 🌌 LIGHT AURORA BACKGROUND (Subtle & Clean) */
        .bg-aurora {
            position: fixed; inset: 0; z-index: -2; background: var(--bg-apple-light); overflow: hidden;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.4; animation: floatOrb 25s infinite alternate ease-in-out;
        }
        .orb-1 { width: 500px; height: 500px; background: rgba(255, 153, 51, 0.2); top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: rgba(59, 130, 246, 0.15); bottom: -20%; right: -10%; animation-delay: -5s; }
        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* 🪟 APPLE GLASSMORPHISM UI */
        .glass-card { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 0, 0, 0.05); 
            border-radius: 28px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .glass-card:hover {
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            /* Hover lift is handled by Anime.js now, but keeping slight border glow */
            border-color: rgba(255, 153, 51, 0.2);
        }

        .welcome-glass { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(0, 0, 0, 0.08); 
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.1); 
        }
        
        .hero-text-gradient { 
            background: linear-gradient(135deg, var(--text-dark) 40%, var(--bhagwa)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* 🔘 BUTTONS */
        .btn-bhagwa { 
            background: linear-gradient(135deg, var(--bhagwa), var(--bhagwa-dark)); 
            color: white; font-weight: 800; text-transform: uppercase; border-radius: 18px; padding: 18px; width: 100%; cursor: pointer; border: none; 
            box-shadow: 0 10px 25px rgba(255, 153, 51, 0.25); transition: all 0.3s; letter-spacing: 1px;
        }

        /* 🏷️ NEW TAG WITH BOUNCE */
        .new-tag {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff3b30; /* Apple Red */
            color: white;
            font-size: 10px;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(255, 59, 48, 0.4);
            z-index: 10;
            animation: floatTag 2s ease-in-out infinite;
        }
        @keyframes floatTag { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .hidden-tag { display: none !important; }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--text-gray); border-radius: 10px; }
    </style>
</head>
<body>

<div class="bg-aurora">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<div id="legal-modal" class="fixed inset-0 bg-black/30 backdrop-blur-xl z-[99999] hidden flex-col items-center justify-center p-4 transition-opacity">
    <div class="glass-card p-8 max-w-lg w-full text-center" style="max-height: 85vh; display: flex; flex-direction: column;">
        <div class="w-16 h-16 mx-auto bg-[#ff9933]/10 text-[#ff9933] rounded-full flex items-center justify-center mb-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        </div>
        <h2 id="lm-title" class="text-2xl font-black uppercase tracking-widest mb-4 text-gray-900">Document Title</h2>
        <div id="lm-content" class="text-xs text-gray-600 font-medium mb-8 leading-relaxed text-left custom-scroll overflow-y-auto pr-3 flex-1"></div>
        <button onclick="closeLegalModal()" class="w-full py-4 bg-gray-100 hover:bg-gray-200 text-gray-900 rounded-xl font-black uppercase tracking-[2px] transition shadow-sm mt-auto">I Understand</button>
    </div>
</div>

<div id="welcome-screen" class="fixed inset-0 z-[11000] bg-white/40 backdrop-blur-2xl flex items-center justify-center p-4 transition-opacity duration-500 overflow-y-auto">
    <div class="welcome-glass p-10 md:p-14 rounded-[40px] text-center max-w-lg w-full border-t-4 border-[#ff9933] relative overflow-hidden my-auto physics-element">
        <img src="https://i.ibb.co/G4xsrr6j/qafx-Ln-R-md.png" class="w-28 mx-auto mb-6 rounded-3xl border border-gray-200 shadow-xl object-contain" crossorigin="anonymous" alt="Logo">
        <h4 class="text-gray-500 font-bold text-[10px] tracking-[6px] uppercase mb-2">Supreme Command Center</h4>
        <h1 class="text-4xl md:text-5xl font-black uppercase tracking-tighter mb-10 hero-text-gradient italic">Patel Traders</h1>
        
        <button onclick="initializePortal(this)" class="btn-bhagwa flex items-center justify-center gap-3">
            Initialize System 
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </button>
        <p class="text-gray-400 text-[9px] mt-6 uppercase font-bold tracking-[3px]">Quantum Encrypted Gateway</p>
    </div>
</div>

<div id="main-hub" class="hidden relative z-10 w-full min-h-screen flex flex-col justify-between p-6 md:p-10">
    
    <header class="flex justify-between items-center w-full max-w-6xl mx-auto opacity-0" id="hubHeader">
        <div class="flex items-center gap-4">
            <img src="https://i.ibb.co/G4xsrr6j/qafx-Ln-R-md.png" class="w-12 h-12 rounded-xl shadow-md border border-gray-200 object-contain bg-white" crossorigin="anonymous" alt="Logo">
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-gray-900">Master <span class="text-[#ff9933]">Hub</span></h1>
                <div class="flex items-center gap-2"><div class="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div><p class="text-[9px] text-emerald-600 font-bold uppercase tracking-[2px]">Systems Online</p></div>
            </div>
        </div>
        <button onclick="window.location.reload()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-[10px] font-bold uppercase tracking-widest text-gray-600 transition border border-gray-200">Refresh</button>
    </header>

    <main class="flex-1 flex items-center justify-center w-full max-w-6xl mx-auto my-10">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-10 w-full" id="cardsContainer">
            
            <div onclick="launchApp(this, 'https://sheelu955.github.io/Admin-Gateway/')" class="glass-card physics-card p-8 flex flex-col items-center justify-center text-center cursor-pointer group opacity-0">
                <div class="w-24 h-24 bg-orange-50 rounded-full flex items-center justify-center mb-6 border border-orange-100 group-hover:scale-110 group-hover:rotate-6 transition-all duration-500 shadow-sm">
                    <svg class="w-10 h-10 text-[#ff9933]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h2 class="text-2xl font-black uppercase text-gray-900 tracking-widest mb-2">Admin Vault</h2>
                <p class="text-[11px] text-gray-500 font-bold uppercase tracking-[1px] leading-relaxed">Master Invoice &<br>Cloud Database</p>
            </div>

            <div onclick="launchApp(this, 'https://sheelu955.github.io/Admin')" class="glass-card physics-card p-8 flex flex-col items-center justify-center text-center cursor-pointer group opacity-0">
                <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-6 border border-blue-100 group-hover:scale-110 group-hover:-rotate-6 transition-all duration-500 shadow-sm">
                    <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </div>
                <h2 class="text-2xl font-black uppercase text-gray-900 tracking-widest mb-2">Resolution</h2>
                <p class="text-[11px] text-gray-500 font-bold uppercase tracking-[1px] leading-relaxed">Complaint Vault &<br>Customer Support</p>
            </div>

            <div onclick="launchStoreApp(this, 'https://sheelu955.github.io/PatelTraders/')" class="glass-card physics-card p-8 flex flex-col items-center justify-center text-center cursor-pointer group opacity-0">
                <span id="storeNewTag" class="new-tag">NEW</span>
                
                <div class="w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center mb-6 border border-emerald-100 group-hover:scale-110 group-hover:rotate-12 transition-all duration-500 shadow-sm">
                    <svg class="w-10 h-10 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z"></path></svg>
                </div>
                <h2 class="text-2xl font-black uppercase text-gray-900 tracking-widest mb-2">Store Console</h2>
                <p class="text-[11px] text-gray-500 font-bold uppercase tracking-[1px] leading-relaxed">Public Interface &<br>Product Management</p>
            </div>

        </div>
    </main>

    <footer class="w-full max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 border-t border-gray-200 pt-6 pb-6 opacity-0" id="hubFooter">
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[2px]">© 2026 Patel Traders</p>
        
        <div class="flex flex-wrap justify-center gap-6">
            <button onclick="openLegal('disclaimer')" class="text-[10px] font-bold text-gray-500 hover:text-gray-900 uppercase tracking-[1px] transition">Disclaimer</button>
            <button onclick="openLegal('terms')" class="text-[10px] font-bold text-gray-500 hover:text-gray-900 uppercase tracking-[1px] transition">Terms</button>
            <button onclick="openLegal('privacy')" class="text-[10px] font-bold text-gray-500 hover:text-gray-900 uppercase tracking-[1px] transition">Privacy</button>
        </div>
    </footer>

</div>

<script>
    // 🧠 1. CACHE LOGIC FOR 'NEW' TAG
    window.addEventListener('DOMContentLoaded', () => {
        // चेक करें कि क्या यूजर ने पहले स्टोर लिंक पर क्लिक किया है
        if(localStorage.getItem('pt_new_store_clicked') === 'true') {
            document.getElementById('storeNewTag').classList.add('hidden-tag');
        }

        // Welcome screen logic
        if(localStorage.getItem('pt_supreme_hub_welcome') === 'true') {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-hub').classList.remove('hidden');
            animateHubIn(); // Hub के एलिमेंट्स को एनीमेट करें
        }
    });

    // 🚀 2. PHYSICS ANIMATIONS (Anime.js)
    function animateHubIn() {
        // Header
        anime({ targets: '#hubHeader', opacity: [0, 1], translateY: [-20, 0], duration: 1000, easing: 'easeOutExpo' });
        // Cards (Gravity fall)
        anime({
            targets: '.physics-card',
            opacity: [0, 1],
            translateY: [-50, 0],
            delay: anime.stagger(150), // एक के बाद एक गिरेंगे
            duration: 1200,
            easing: 'easeOutElastic(1, .6)'
        });
        // Footer
        anime({ targets: '#hubFooter', opacity: [0, 1], translateY: [20, 0], duration: 1000, delay: 500, easing: 'easeOutExpo' });
    }

    function initializePortal(btn) {
        // बटन दबाने का स्प्रिंग इफ़ेक्ट
        anime({
            targets: btn, scale: 0.9, duration: 100, easing: 'easeInOutQuad',
            complete: function() {
                anime({ targets: btn, scale: 1, duration: 300, easing: 'easeOutElastic(1, .5)' });
                
                localStorage.setItem('pt_supreme_hub_welcome', 'true'); 
                document.getElementById('welcome-screen').style.opacity = '0';
                
                setTimeout(() => {
                    document.getElementById('welcome-screen').style.display = 'none';
                    document.getElementById('main-hub').classList.remove('hidden');
                    animateHubIn(); // हब खोलते ही एनीमेशन
                }, 500);
            }
        });
    }

    // 🚀 3. APP LAUNCHERS WITH PHYSICS
    function launchApp(element, url) {
        animateClickAndGo(element, url);
    }

    // स्पेशल स्टोर लांचर ('New' टैग छिपाने के लिए)
    function launchStoreApp(element, url) {
        // कैश में सेव करें ताकि 'New' टैग दोबारा न दिखे
        localStorage.setItem('pt_new_store_clicked', 'true');
        document.getElementById('storeNewTag').style.opacity = '0'; // एनीमेशन के साथ छुपाएं
        
        animateClickAndGo(element, url);
    }

    function animateClickAndGo(element, url) {
        anime({
            targets: element,
            scale: 0.92,
            duration: 150,
            easing: 'easeOutQuad',
            complete: function() {
                anime({
                    targets: element,
                    scale: 1,
                    duration: 400,
                    easing: 'easeOutElastic(1, .5)'
                });
                setTimeout(() => { window.location.href = url; }, 300);
            }
        });
    }

    // ⚖️ 4. LEGAL DOCUMENTS (Same as old, just theme updated)
    const legalDocs = {
        'disclaimer': { title: "System Disclaimer", content: `<p class="mb-4"><strong class="text-gray-900">1. Authorized Access Only:</strong> This portal is strictly for authorized admins.</p><p class="mb-4"><strong class="text-gray-900">2. Data Accuracy:</strong> The system processes invoices manually.</p><p><strong class="text-gray-900">3. Network Security:</strong> Do not share your Admin Hub URL.</p>` },
        'terms': { title: "Terms & Conditions", content: `<p class="mb-4"><strong class="text-gray-900">1. Service Scope:</strong> Digital management system for furniture bills.</p><p class="mb-4"><strong class="text-gray-900">2. Invoicing Validity:</strong> Valid only if unmodified.</p><p><strong class="text-gray-900">3. Jurisdiction:</strong> Kannauj (U.P.).</p>` },
        'privacy': { title: "Privacy Policy", content: `<p class="mb-4"><strong class="text-gray-900">1. Data Collection:</strong> Only essential customer info is stored.</p><p class="mb-4"><strong class="text-gray-900">2. Cloud Storage:</strong> Data is encrypted on Google Cloud.</p><p><strong class="text-gray-900">3. Cache Memory:</strong> Uses local device storage.</p>` }
    };

    function openLegal(docType) {
        const doc = legalDocs[docType];
        document.getElementById('lm-title').innerText = doc.title;
        document.getElementById('lm-content').innerHTML = doc.content;
        
        const modal = document.getElementById('legal-modal');
        modal.style.display = 'flex';
        // Modal popup physics
        anime({ targets: '.glass-card', scale: [0.8, 1], opacity: [0, 1], duration: 500, easing: 'easeOutElastic(1, .6)' });
        setTimeout(() => modal.classList.remove('opacity-0'), 10);
    }

    function closeLegalModal() {
        const modal = document.getElementById('legal-modal');
        anime({ targets: '.glass-card', scale: [1, 0.9], opacity: [1, 0], duration: 200, easing: 'easeInQuad' });
        modal.classList.add('opacity-0');
        setTimeout(() => modal.style.display = 'none', 300);
    }
</script>

</body>
</html>
