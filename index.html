<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT Admin Hub | Patel Traders</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        
        :root { --bhagwa: #ff9933; --bg-dark: #f8fafc; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.03"><circle cx="50" cy="50" r="45" stroke="%23000000" stroke-width="2" fill="none"/><path d="M50 5 L50 95 M5 50 L95 50 M18 18 L82 82 M18 82 L82 18 M32.5 8.5 L67.5 91.5 M8.5 32.5 L91.5 67.5 M8.5 67.5 L91.5 32.5 M32.5 91.5 L67.5 8.5" stroke="%23000000" stroke-width="1"/></svg>');
            background-size: 80vw;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #0f172a; 
            margin: 0; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 🚀 Welcome Screen CSS */
        .welcome-screen { 
            position: absolute; inset: 0; z-index: 9999;
            background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; 
        }

        /* 🔘 Buttons */
        .btn-bhagwa { 
            background: linear-gradient(135deg, #ff9933, #e65c00); 
            color: #ffffff !important; 
            font-weight: 800; text-transform: uppercase; border-radius: 12px; padding: 16px; width: 100%; cursor: pointer; border: none; 
            box-shadow: 0 8px 25px rgba(255, 153, 51, 0.4) !important; 
            transition: 0.2s; letter-spacing: 1px; 
        }
        .btn-bhagwa:active { transform: scale(0.96); box-shadow: 0 4px 15px rgba(255, 153, 51, 0.3) !important; }

        /* 🌐 Navigation Bar (Clean App Header) */
        .browser-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            z-index: 50;
            position: relative;
        }

        .nav-btn-group {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            background: rgba(0, 0, 0, 0.03);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: rgba(255, 153, 51, 0.1); color: var(--bhagwa); transform: translateY(-1px); }
        .nav-btn:active { transform: scale(0.95); }

        /* 🏠 Home Screen (Quick Links) */
        .home-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            padding: 40px 20px 40px 20px; 
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }

        .pt-card {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.04);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 20;
        }
        .pt-card:hover {
            transform: translateY(-8px);
            border-color: var(--bhagwa);
            box-shadow: 0 15px 40px rgba(255, 153, 51, 0.2);
        }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* 🖼️ Iframe Container */
        #browserFrame {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: #ffffff;
        }

        /* Loading Bar */
        #loadingBar {
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--bhagwa);
            width: 0%;
            transition: width 0.3s ease;
            z-index: 100;
            box-shadow: 0 0 10px var(--bhagwa);
        }
        
        /* Main Wrapper */
        #view-main {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>

    <div id="view-welcome" class="welcome-screen">
        <div class="mb-8 animate-[fadeInDown_1s_ease-out]">
            <img src="https://i.ibb.co/C30Ybjck/PT-20250224-170650-0000.png" class="w-28 mx-auto rounded-[35px] shadow-[0_15px_40px_rgba(255,153,51,0.3)] border border-[#ff9933]/20 mb-6" crossorigin="anonymous">
            <h4 class="text-[#ff9933] font-black uppercase tracking-[5px] text-[10px] mb-2">Secure Admin Portal</h4>
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 uppercase italic leading-tight">Patel Traders</h1>
        </div>
        <button onclick="enterAdminHub()" class="btn-bhagwa px-12 py-4 tracking-[3px] max-w-xs">Access Hub →</button>
    </div>

    <div id="view-main">
        
        <div id="loadingBar"></div>

        <nav class="browser-nav">
            <div class="nav-btn-group">
                <button class="nav-btn" onclick="goBack()" title="Back">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <button class="nav-btn" onclick="goForward()" title="Forward">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
                <button class="nav-btn" onclick="refreshPage()" title="Refresh">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                </button>
                <button class="nav-btn" onclick="goHome()" title="Admin Home">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
                </button>
            </div>
            
            <img src="https://i.ibb.co/C30Ybjck/PT-20250224-170650-0000.png" class="w-8 h-8 rounded-lg shadow-sm border border-slate-200" crossorigin="anonymous" title="Patel Traders">
        </nav>

        <div id="homeScreen" class="home-screen custom-scrollbar">
            <div class="text-center mb-10 w-full">
                <img src="https://i.ibb.co/C30Ybjck/PT-20250224-170650-0000.png" class="w-20 md:w-24 mx-auto rounded-[25px] shadow-[0_15px_40px_rgba(255,153,51,0.3)] mb-4" crossorigin="anonymous">
                <h4 class="text-[#ff9933] font-black uppercase tracking-[5px] text-[10px] md:text-[12px] mb-1">Central Management</h4>
                <h1 class="text-3xl md:text-4xl font-black text-slate-900 uppercase italic">Admin Hub</h1>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl px-4 pb-10">
                
                <div class="pt-card" onclick="loadURL('https://sheelu955.github.io/Admin-Gateway/')">
                    <div class="icon-box" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);">
                        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                    </div>
                    <div>
                        <h2 class="text-lg font-black uppercase text-slate-800">Admin Vault</h2>
                        <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">Billing & Management</p>
                    </div>
                </div>

                <div class="pt-card" onclick="loadURL('https://sheelu955.github.io/CMS-COMPLAINT-MANAGEMENT-SYSTEM/')">
                    <div class="icon-box" style="background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);">
                        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                    </div>
                    <div>
                        <h2 class="text-lg font-black uppercase text-slate-800">CMS Portal</h2>
                        <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">Customer Complaints</p>
                    </div>
                </div>

            </div>
        </div>

        <iframe id="browserFrame" name="browserFrame"></iframe>
    </div>

    <script>
        // 🚀 SEPARATE CACHE MEMORY FOR ADMIN
        // Using "pt_admin_welcome_seen" instead of "pt_main_welcome_seen" to avoid conflicts with customer hub
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('pt_admin_welcome_seen') === 'true') {
                document.getElementById('view-welcome').style.display = 'none';
                document.getElementById('view-main').style.display = 'flex';
                
                // Restore last session URL
                const lastUrl = sessionStorage.getItem('pt_admin_hub_last_url');
                if (lastUrl && lastUrl !== 'home') {
                    loadURL(lastUrl, true);
                }
            }
        });

        // 🔘 Action to Enter Hub from Welcome Screen
        function enterAdminHub() {
            localStorage.setItem('pt_admin_welcome_seen', 'true'); // Save to Cache
            document.getElementById('view-welcome').style.display = 'none';
            document.getElementById('view-main').style.display = 'flex';
        }

        let historyStack = [];
        let currentIdx = -1;
        const frame = document.getElementById('browserFrame');
        const homeScreen = document.getElementById('homeScreen');
        const loadingBar = document.getElementById('loadingBar');

        function simulateLoading() {
            loadingBar.style.width = '0%';
            loadingBar.style.display = 'block';
            setTimeout(() => loadingBar.style.width = '30%', 100);
            setTimeout(() => loadingBar.style.width = '70%', 500);
            setTimeout(() => {
                loadingBar.style.width = '100%';
                setTimeout(() => { loadingBar.style.display = 'none'; }, 300);
            }, 1000); 
        }

        function loadURL(url, isHistoryNav = false) {
            simulateLoading();
            homeScreen.style.display = 'none';
            frame.style.display = 'block';
            
            // Load URL into frame
            frame.src = url;
            
            // Update Session Cache
            sessionStorage.setItem('pt_admin_hub_last_url', url);

            if (!isHistoryNav) {
                historyStack = historyStack.slice(0, currentIdx + 1);
                historyStack.push(url);
                currentIdx++;
            }
        }

        function goHome() {
            simulateLoading();
            homeScreen.style.display = 'flex';
            frame.style.display = 'none';
            frame.src = '';
            sessionStorage.setItem('pt_admin_hub_last_url', 'home');
            
            historyStack = historyStack.slice(0, currentIdx + 1);
            historyStack.push('home');
            currentIdx++;
        }

        function goBack() {
            if (currentIdx > 0) {
                currentIdx--;
                let prevUrl = historyStack[currentIdx];
                if (prevUrl === 'home') {
                    goHomeState();
                } else {
                    loadURL(prevUrl, true);
                }
            }
        }

        function goForward() {
            if (currentIdx < historyStack.length - 1) {
                currentIdx++;
                let nextUrl = historyStack[currentIdx];
                if (nextUrl === 'home') {
                    goHomeState();
                } else {
                    loadURL(nextUrl, true);
                }
            }
        }

        function goHomeState() {
            homeScreen.style.display = 'flex';
            frame.style.display = 'none';
            frame.src = '';
            sessionStorage.setItem('pt_admin_hub_last_url', 'home');
        }

        function refreshPage() {
            if (frame.style.display === 'block') {
                simulateLoading();
                let currentUrl = frame.src;
                frame.src = currentUrl; 
            }
        }
    </script>
</body>
</html>
